services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: condominio-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000} 
    depends_on:
      - mongodb
    networks:
      - condominio_network

  mongodb:
    image: mongo:7
    container_name: condominio-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: condominio
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - condominio_network

networks:
  condominio_network:
    driver: bridge

volumes:
  mongodb_data: