services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: condominio-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL}
      PLATFORM_ROOT_DOMAIN: ${PLATFORM_ROOT_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - mongodb
      - redis
      - ollama
    networks:
      - condominio_network

  redis:
    image: redis:7-alpine
    container_name: condominio-redis
    restart: unless-stopped
    networks:
      - condominio_network

  mongodb:
    image: mongo:7
    container_name: condominio-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: condominio
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - condominio_network

  ollama:
    image: ollama/ollama:latest
    container_name: condominio-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - condominio_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Opcional: despliega frontend en el mismo stack para que api:3001 resuelva sin config extra
  frontend:
    build:
      context: ../../frontend/condominio
      dockerfile: Dockerfile
    container_name: condominio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PROXY_TARGET: http://api:3001
      NEXT_PUBLIC_PLATFORM_ROOT_DOMAIN: ${PLATFORM_ROOT_DOMAIN:-buildforge.work}
    depends_on:
      - api
    networks:
      - condominio_network

networks:
  condominio_network:
    driver: bridge

volumes:
  mongodb_data:
  ollama_data:
