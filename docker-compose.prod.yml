services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: condominio-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USUARIO: ${ADMIN_USUARIO}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SEED_ADMIN: ${SEED_ADMIN:-true}
    depends_on:
      - mongodb
    networks:
      - condominio_network

  mongodb:
    image: mongo:7
    container_name: condominio-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: condominio
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - condominio_network

networks:
  condominio_network:
    driver: bridge

volumes:
  mongodb_data:
